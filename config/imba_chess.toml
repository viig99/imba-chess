[dataset]
min_avg_elo = 2000
test_min_avg_elo = 2400
# Drop bullet/hyperbullet: estimated duration (base + 40 * increment) must be >= 180s.
min_time_control_sec = 180
split = "train"
dataset_name = "Lichess/standard-chess-games"
train_start_month = "2021-01"
train_end_month = "2025-06"
val_start_month = "2025-07"
val_end_month = "2025-07"
test_start_month = "2025-08"
test_end_month = "2025-09"
val_max_games = 100000
test_max_games = 100000
cache_dir = "artifacts/hf_cache"
parquet_batch_size = 8192
max_seq_len = 512
shuffle_train_month_files_on_start = true
# Game-level shuffle buffer per dataloader worker (rows held in memory); 0 disables.
train_shuffle_buffer_size = 10000
# Optional fixed seed for train-month shuffling; null/randomized each process start if omitted.
# train_month_shuffle_seed = 12345

[board_state]
en_passant = "legal"
halfmove_max = 100
halfmove_bucket_size = 2
fullmove_max = 200
fullmove_bucket_size = 2

[vocab]
path = "artifacts/move_vocab_static_uci.json"
include_unk = false

[dataloader]
max_tokens_per_batch = 40960
num_workers = 12
pin_memory = true
prefetch_factor = 2
persistent_workers = true

[model]
model_dim = 768
linear_hidden_dim = 64
attention_dim = 64
num_heads = 12
num_layers = 8
dropout = 0.0
max_position_embeddings = 513
halfmove_vocab_size = 128
fullmove_vocab_size = 128
ignore_index = -100
relative_attention_bias = "position"
label_smoothing = 0.05
elo_weight_min_elo = 2000
elo_weight_max_elo = 2800
elo_loss_weight_alpha = 1.0
elo_loss_weight_strength = 1.0
enable_value_head = true
value_loss_weight = 0.5
value_weight_alpha = 0.9
value_label_smoothing = 0.0
moves_left_loss_weight = 0.05

[training]
epochs = 100
steps_per_epoch = 10000
eval_every_steps = 1000
log_every_steps = 10
full_val_every_epochs = 1
fast_val_max_games = 10000
fast_test_max_games = 10000
max_lr = 7e-4
# Start at full LR: StableAdamW's update clipping + grad_clip_norm cover early
# second-moment instability, and warmup wastes the most sample-efficient steps.
lr_start_factor = 1.0
lr_end_factor = 0.5
onecycle_warmup_fraction_first_epoch = 0.1
weight_decay = 0.01
grad_clip_norm = 1.0
seed = 42
deterministic_eval = true
eval_num_workers = 0
save_last_every_steps = 1000
last_checkpoint_keep = 1
optimizer_triton = true
optimizer_kahan_sum = true
compile_model = true
device = "auto"
dtype = "bfloat16"
checkpoint_dir = "artifacts/checkpoints"
checkpoint_keep = 3

[eval_vs_stockfish]
games = 1000
max_plies = 512
seed = 42
stockfish_path = "/usr/bin/stockfish"
stockfish_time_sec = 0.05
stockfish_threads = 1
stockfish_hash_mb = 64
stockfish_limit_strength = false
# Optional when limit-strength mode is enabled.
# stockfish_elo = 1600
# Optional search limits. If omitted, only stockfish_time_sec is used.
# stockfish_nodes = 1000
# stockfish_depth = 10
# Optional ladder mode.
ladder_elos = "1320,1600,1800,2000"
ladder_games_per_segment = 100
# include_full_strength_segment = true
device = "auto"
dtype = "bfloat16"
compile = true
model_move_policy = "value_search_halving"
value_rerank_top_k = 16
# Weight of the log-prob policy prior added to the value score (value-dominant scoring).
# Sweep vs SF1400: flat 0.40 across 0.05-0.2; lambda=0 collapses to 0.12.
value_rerank_lambda = 0.05
# value_search_halving knobs (sequential halving; halving_rounds = 1 is pure beam).
search_budget = 256
search_top_m = 16
halving_rounds = 0
search_refutation_top_r = 2
search_expand_top = 3
search_max_depth = 4
# Standalone value-net blend: value = (1-alpha)*model_head + alpha*net.
# Unset checkpoint = current behavior (model head only).
# value_net_checkpoint = "artifacts/value_net/value_net_best.pt"
value_net_alpha = 1.0
opening_random_plies = 1
debug_trace_games = 3
debug_trace_max_plies = 80
debug_topk = 5
save_games = true
save_games_dir = "artifacts/eval/games"

[value_net]
# Standalone position-only WDL net distilled from Stockfish evals
# (Lichess/chess-position-evaluations). Trained by scripts/train_value_net.py;
# consumed at eval time via [eval_vs_stockfish] value_net_checkpoint.
dim = 256
num_heads = 4
num_layers = 6
depth_min = 12
batch_size = 1024
num_workers = 12
max_lr = 3e-4
train_steps = 200000
val_every_steps = 5000
val_permille = 50
checkpoint_dir = "artifacts/value_net"
