[dataset]
min_avg_elo = 2000
split = "train"
dataset_name = "Lichess/standard-chess-games"
train_start_month = "2019-01"
train_end_month = "2025-06"
val_start_month = "2025-07"
val_end_month = "2025-07"
test_start_month = "2025-08"
test_end_month = "2025-09"
val_max_games = 50000
test_max_games = 50000
cache_dir = "artifacts/hf_cache"
parquet_batch_size = 8192
return_dataclasses = false
max_seq_len = 512

[board_state]
en_passant = "legal"
halfmove_max = 100
halfmove_bucket_size = 2
fullmove_max = 200
fullmove_bucket_size = 2

[vocab]
path = "artifacts/move_vocab_static_uci.json"
include_unk = false

[dataloader]
max_tokens_per_batch = 32768
num_workers = 4
pin_memory = true
prefetch_factor = 4
persistent_workers = true

[model]
model_dim = 384
linear_hidden_dim = 48
attention_dim = 48
num_heads = 8
num_layers = 8
dropout = 0.1
max_position_embeddings = 513
halfmove_vocab_size = 128
fullmove_vocab_size = 128
ignore_index = -100
relative_attention_bias = "position"

[training]
epochs = 20
steps_per_epoch = 10000
eval_every_steps = 1000
log_every_steps = 10
full_val_every_epochs = 1
fast_val_max_games = 5000
max_lr = 1e-3
lr_start_factor = 0.1
lr_end_factor = 0.5
onecycle_warmup_fraction_first_epoch = 0.1
weight_decay = 0.01
grad_clip_norm = 1.0
seed = 42
deterministic_eval = true
eval_num_workers = 0
save_last_every_steps = 1000
last_checkpoint_keep = 1
optimizer_fused = true
compile_model = true
device = "auto"
dtype = "bfloat16"
checkpoint_dir = "artifacts/checkpoints"
checkpoint_keep = 3
