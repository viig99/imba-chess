[dataset]
min_avg_elo = 2200
split = "train"
dataset_name = "Lichess/standard-chess-games"
cache_dir = "artifacts/hf_cache"
parquet_batch_size = 2048
return_dataclasses = false
max_seq_len = 512

[board_state]
en_passant = "legal"
halfmove_max = 100
halfmove_bucket_size = 2
fullmove_max = 200
fullmove_bucket_size = 2

[vocab]
path = "artifacts/move_vocab_static_uci.json"
include_unk = false

[dataloader]
max_tokens_per_batch = 6144
num_workers = 2
pin_memory = true

[model]
model_dim = 384
linear_hidden_dim = 128
attention_dim = 128
num_heads = 4
num_layers = 6
dropout = 0.1
max_position_embeddings = 512
halfmove_vocab_size = 128
fullmove_vocab_size = 128
ignore_index = -100
relative_attention_bias = "position"
